name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # -----------------------------------------------------------------------
  # Change detection — skip jobs when only docs/specs changed
  # -----------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'tests/**'
              - 'requirements.txt'
              - 'Dockerfile'
              - 'pyproject.toml'

  # -----------------------------------------------------------------------
  # Lint & format — Ruff check + format
  # -----------------------------------------------------------------------
  lint-format:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install ruff
      - run: ruff check src/
      - run: ruff format --check src/

  # -----------------------------------------------------------------------
  # Test — pytest
  # -----------------------------------------------------------------------
  test:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/

  # -----------------------------------------------------------------------
  # Security scan — Trivy filesystem scan
  # -----------------------------------------------------------------------
  security-scan:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: '1'

  # -----------------------------------------------------------------------
  # Docker build — push to GHCR on main
  # -----------------------------------------------------------------------
  docker-build:
    needs: [changes, gate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -----------------------------------------------------------------------
  # Deploy to Railway — main branch only, after gate passes
  # -----------------------------------------------------------------------
  deploy-railway:
    needs: [gate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-railway
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Deploy to Railway
        run: railway up --detach --service fastapi
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Health check
        run: |
          echo "Waiting 30s for deploy to stabilize..."
          sleep 30
          for i in 1 2 3; do
            if curl -sf https://mombot.sierracodeco.com/health; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 3 attempts"
          exit 1

  # -----------------------------------------------------------------------
  # Gate — single status check for branch protection
  # -----------------------------------------------------------------------
  gate:
    if: always()
    needs: [changes, lint-format, test, security-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          echo "changes: ${{ needs.changes.result }}"
          echo "lint-format: ${{ needs.lint-format.result }}"
          echo "test: ${{ needs.test.result }}"
          echo "security-scan: ${{ needs.security-scan.result }}"

          # If no app changes, all conditional jobs are skipped — that's OK
          if [[ "${{ needs.changes.outputs.app }}" != "true" ]]; then
            echo "No app changes — all checks skipped (OK)"
            exit 0
          fi

          # If any required job failed, fail the gate
          if [[ "${{ needs.lint-format.result }}" == "failure" || \
                "${{ needs.test.result }}" == "failure" || \
                "${{ needs.security-scan.result }}" == "failure" ]]; then
            echo "Required job(s) failed"
            exit 1
          fi

          echo "All checks passed"
