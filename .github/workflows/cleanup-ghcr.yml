name: Cleanup GHCR Images

on:
  schedule:
    - cron: '0 3 * * 0'  # Sunday 3 AM UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: snok/container-retention-policy@v3.0.0
        with:
          account: user
          token: ${{ secrets.PAT_PACKAGES }}
          image-names: family-meeting
          cut-off: 30 days ago UTC
          keep-n-most-recent: 20
